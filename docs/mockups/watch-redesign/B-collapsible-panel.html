<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>布局 B — 右栏可折叠（双列 · 含侧栏）</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      fontFamily: { sans: ['Inter','-apple-system','BlinkMacSystemFont','"Segoe UI"','sans-serif'] },
      colors: {
        brand: { 50:'#fff1eb',100:'#ffe0d3',400:'#ff7a45',500:'#ff5a1f',600:'#e84a10' },
        canvas:'#ffffff','surface-soft':'#fafafa','surface-card':'#f4f4f5',
        ink:'#0a0a0a', body:'#27272a', muted:'#71717a','muted-soft':'#a1a1aa',
        hairline:'#ededed','surface-dark':'#0a0a0a',
      },
      borderRadius: { sm:'8px', DEFAULT:'12px', lg:'16px', pill:'9999px' },
      boxShadow: { soft:'0 1px 2px rgba(10,10,10,.04)', card:'0 2px 8px rgba(10,10,10,.05)', lift:'0 12px 32px rgba(10,10,10,.08)', brand:'0 8px 24px rgba(255,90,31,.28)' },
    }}
  }
</script>
<style>
  body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#fafafa;color:#0a0a0a;}
  .scroll-thin::-webkit-scrollbar{width:8px} .scroll-thin::-webkit-scrollbar-thumb{background:#d4d4d8;border-radius:4px}
  .word{cursor:pointer;transition:background-color .15s,color .15s;border-radius:4px}
  .word:hover{background:#fff1eb;color:#ff5a1f}
  .word-hl{background:#fff1eb;color:#ff5a1f;border-radius:4px}
  :focus-visible{outline:none;box-shadow:0 0 0 3px rgba(255,90,31,.35);border-radius:8px}
  /* grid 列宽过渡：展开=宽面板，折叠=窄字幕轨，视频列始终占大头 */
  #grid{grid-template-columns:2fr 1fr;transition:grid-template-columns .2s ease;}
  #grid.collapsed{grid-template-columns:1fr 220px;}
</style>
</head>
<body class="h-screen overflow-hidden">

<div class="flex h-screen overflow-hidden">

  <!-- 左侧功能栏（复刻真实 Sidebar，248px） -->
  <aside class="flex flex-col h-full flex-shrink-0 w-[248px] bg-canvas border-r border-hairline overflow-y-auto">
    <div class="flex h-16 items-center border-b border-hairline px-5">
      <span class="flex h-8 w-8 items-center justify-center rounded-lg bg-brand-500 text-white text-base font-extrabold flex-shrink-0 shadow-brand">S</span>
      <span class="ml-3 text-[17px] font-bold text-ink tracking-tight whitespace-nowrap">SeeWord</span>
    </div>
    <nav class="flex-1 px-3 py-3.5 text-sm">
      <div class="px-3 pt-3.5 pb-1.5 text-[11px] font-semibold uppercase tracking-wider text-muted-soft">主菜单</div>
      <div class="flex flex-col gap-0.5">
        <a class="flex items-center gap-3 rounded-lg px-3 py-2.5 font-medium text-muted hover:bg-surface-card hover:text-ink transition-colors cursor-pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l1.9 5.8H20l-5 3.7 1.9 5.8L12 14.8 7.1 18.3 9 12.5 4 8.8h6.1z"/></svg>首页</a>
        <a class="flex items-center gap-3 rounded-lg px-3 py-2.5 font-medium text-muted hover:bg-surface-card hover:text-ink transition-colors cursor-pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M16 8l-2 6-6 2 2-6z"/></svg>浏览视频</a>
        <a class="flex items-center gap-3 rounded-lg px-3 py-2.5 font-medium bg-ink text-white transition-colors cursor-pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="13" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3"/></svg>口语练习<span class="ml-auto text-[11px] font-semibold bg-brand-500 text-white px-[7px] py-0.5 rounded-full">AI</span></a>
      </div>
      <div class="px-3 pt-5 pb-1.5 text-[11px] font-semibold uppercase tracking-wider text-muted-soft">社区</div>
      <div class="flex flex-col gap-0.5"><a class="flex items-center gap-3 rounded-lg px-3 py-2.5 font-medium text-muted hover:bg-surface-card hover:text-ink transition-colors cursor-pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></svg>社区精选</a></div>
      <div class="px-3 pt-5 pb-1.5 text-[11px] font-semibold uppercase tracking-wider text-muted-soft">学习</div>
      <div class="flex flex-col gap-0.5">
        <a class="flex items-center gap-3 rounded-lg px-3 py-2.5 font-medium text-muted hover:bg-surface-card hover:text-ink transition-colors cursor-pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>学习面板</a>
        <a class="flex items-center gap-3 rounded-lg px-3 py-2.5 font-medium text-muted hover:bg-surface-card hover:text-ink transition-colors cursor-pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>词汇本</a>
      </div>
      <div class="px-3 pt-5 pb-1.5 text-[11px] font-semibold uppercase tracking-wider text-muted-soft">账户</div>
      <div class="flex flex-col gap-0.5"><a class="flex items-center gap-3 rounded-lg px-3 py-2.5 font-medium text-muted hover:bg-surface-card hover:text-ink transition-colors cursor-pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 20h20l-2-9-5 3-3-6-3 6-5-3z"/></svg>Pro 会员</a></div>
    </nav>
    <div class="p-3 border-t border-hairline">
      <div class="bg-surface-soft border border-hairline rounded-lg p-3.5">
        <div class="text-[13px] font-semibold">免费试用 Pro</div>
        <div class="text-xs text-muted mt-0.5">解锁无限口语评测</div>
        <button class="block w-full mt-2.5 bg-ink text-white text-[13px] font-semibold py-2 rounded-lg hover:bg-black transition-colors cursor-pointer">升级 Pro →</button>
      </div>
    </div>
  </aside>

  <!-- 右侧：顶栏 + 主内容 -->
  <div class="flex flex-1 flex-col overflow-hidden min-w-0">

    <header class="flex items-center gap-3 h-16 px-6 bg-canvas border-b border-hairline flex-shrink-0">
      <a href="index.html" class="inline-flex items-center gap-1.5 text-sm font-medium text-muted hover:text-ink transition-colors cursor-pointer"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>返回浏览</a>
      <div class="h-4 w-px bg-hairline"></div>
      <h1 class="text-[14px] font-semibold text-ink truncate flex-1">How to Speak So That People Want to Listen — Julian Treasure</h1>
      <button class="w-9 h-9 rounded-lg flex items-center justify-center text-muted hover:bg-surface-card hover:text-ink transition-colors cursor-pointer" title="收藏"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></button>
      <button class="w-9 h-9 rounded-lg flex items-center justify-center text-muted hover:bg-surface-card hover:text-ink transition-colors cursor-pointer" title="分享"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg></button>
    </header>

    <main class="flex-1 overflow-y-auto scroll-thin">
      <div class="p-6">

        <!-- 双列：始终两列并排。展开=2fr/1fr 宽面板；折叠=1fr/220px 窄字幕轨 -->
        <div id="grid" class="grid gap-6 items-start">

          <!-- 左：视频 + 字幕卡 + 跟读 -->
          <div class="min-w-0">
            <div class="relative w-full rounded-xl overflow-hidden bg-surface-dark aspect-video shadow-lift">
              <img src="https://picsum.photos/seed/speaking-watch-b3/1280/720" class="absolute inset-0 w-full h-full object-cover opacity-90" alt=""/>
              <div class="absolute inset-0 bg-gradient-to-t from-black/45 to-transparent"></div>
              <button class="absolute inset-0 flex items-center justify-center group cursor-pointer" aria-label="播放"><span class="w-20 h-20 rounded-full bg-white/90 flex items-center justify-center shadow-xl transition-colors group-hover:bg-brand-50"><svg width="30" height="30" viewBox="0 0 24 24" fill="#ff5a1f" class="ml-1 transition-colors group-hover:fill-brand-600"><path d="M8 5v14l11-7z"/></svg></span></button>
              <div class="absolute left-0 right-0 bottom-0 px-4 pb-3"><div class="h-1 rounded-full bg-white/25 overflow-hidden"><div class="h-full bg-brand-500" style="width:38%"></div></div></div>
              <span class="absolute top-3 right-3 text-xs font-medium text-white/90 bg-black/40 rounded px-2 py-0.5">TED · B2 · 09:58</span>
            </div>

            <!-- 字幕卡：紧贴视频 -->
            <div class="mt-3 bg-canvas border border-hairline rounded-xl p-5">
              <div class="flex items-start gap-4">
                <div class="flex-1 min-w-0">
                  <p class="text-[18px] font-semibold leading-[1.7] text-ink max-w-[68ch]"><span class="word-hl">I think</span><span class="word"> the most important thing </span><span class="word">is to be honest</span><span class="word"> and authentic.</span></p>
                  <p class="text-[13px] text-muted mt-1.5 leading-[1.7] max-w-[68ch]">我认为最重要的是保持诚实与真实。</p>
                </div>
                <button id="speakToggle" class="shrink-0 inline-flex items-center gap-1.5 min-h-[44px] px-3.5 py-2 rounded-lg text-[13px] font-semibold text-brand-500 bg-brand-50 hover:bg-brand-100 transition-colors cursor-pointer"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>跟读</button>
              </div>
              <div id="speakPanel" class="hidden mt-4 pt-4 border-t border-hairline">
                <div class="flex items-center gap-3 bg-surface-soft rounded-lg p-3">
                  <button class="w-11 h-11 rounded-full bg-brand-500 text-white flex items-center justify-center shadow-brand animate-pulse shrink-0 cursor-pointer" aria-label="停止录音"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="4" height="12" rx="1"/><rect x="14" y="6" width="4" height="12" rx="1"/></svg></button>
                  <div class="flex-1"><p class="text-[13px] font-semibold text-ink">正在录音…</p><div class="flex items-end gap-0.5 h-5 mt-1" aria-hidden="true"><span class="w-1 bg-brand-400 rounded" style="height:40%"></span><span class="w-1 bg-brand-400 rounded" style="height:75%"></span><span class="w-1 bg-brand-400 rounded" style="height:55%"></span><span class="w-1 bg-brand-400 rounded" style="height:90%"></span><span class="w-1 bg-brand-400 rounded" style="height:30%"></span></div></div>
                  <span class="text-[13px] text-muted">00:03</span>
                  <button class="text-[13px] font-semibold text-muted hover:text-ink px-2 cursor-pointer">取消</button>
                </div>
              </div>
            </div>
          </div>

          <!-- 右：字幕面板。同一容器，展开/折叠只是改内部内容 + 列宽，永远不消失、不换行 -->
          <aside id="panel" class="bg-canvas border border-hairline rounded-xl lg:sticky lg:top-6 overflow-hidden min-w-0">

            <!-- ============ 展开态：模式切换 + 宽列表 + 折叠按钮 ============ -->
            <div id="panelExpanded">
              <div class="flex items-center gap-2 px-3 py-3 border-b border-hairline">
                <div class="flex items-center gap-1 flex-1">
                  <button class="px-3 py-1.5 rounded-lg text-[13px] font-semibold bg-brand-50 text-brand-500 transition-colors cursor-pointer">双语</button>
                  <button class="px-3 py-1.5 rounded-lg text-[13px] font-medium text-muted hover:bg-surface-card hover:text-ink transition-colors cursor-pointer">英文</button>
                  <button class="px-3 py-1.5 rounded-lg text-[13px] font-medium text-muted hover:bg-surface-card hover:text-ink transition-colors cursor-pointer">中文</button>
                </div>
                <button id="collapseBtn" class="w-9 h-9 rounded-lg flex items-center justify-center text-muted hover:bg-surface-card hover:text-ink transition-colors cursor-pointer" title="收起为字幕轨"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
              </div>
              <div class="scroll-thin overflow-y-auto p-2" style="max-height:540px">
                <button class="w-full text-left px-3 py-2.5 rounded-lg bg-brand-50 border-l-2 border-brand-500 transition-colors cursor-pointer"><p class="text-[14px] font-semibold text-ink leading-[1.6]">I think the most important thing is to be honest and authentic.</p><p class="text-[12px] text-muted mt-0.5">我认为最重要的是保持诚实与真实。</p></button>
                <button class="w-full text-left px-3 py-2.5 rounded-lg hover:bg-surface-soft transition-colors cursor-pointer"><p class="text-[14px] text-body leading-[1.6]">The human voice is the most powerful sound in the world.</p><p class="text-[12px] text-muted mt-0.5">人类的声音是世界上最有力量的声音。</p></button>
                <button class="w-full text-left px-3 py-2.5 rounded-lg hover:bg-surface-soft transition-colors cursor-pointer"><p class="text-[14px] text-body leading-[1.6]">It's the only one that can start a war or say "I love you."</p><p class="text-[12px] text-muted mt-0.5">它是唯一能发动战争、也能说出"我爱你"的声音。</p></button>
                <button class="w-full text-left px-3 py-2.5 rounded-lg hover:bg-surface-soft transition-colors cursor-pointer"><p class="text-[14px] text-body leading-[1.6]">And yet many people have lost the habit of listening.</p><p class="text-[12px] text-muted mt-0.5">然而许多人已经失去了倾听的习惯。</p></button>
                <button class="w-full text-left px-3 py-2.5 rounded-lg hover:bg-surface-soft transition-colors cursor-pointer"><p class="text-[14px] text-body leading-[1.6]">We speak too much, and we listen too little.</p><p class="text-[12px] text-muted mt-0.5">我们说得太多，听得太少。</p></button>
                <button class="w-full text-left px-3 py-2.5 rounded-lg hover:bg-surface-soft transition-colors cursor-pointer"><p class="text-[14px] text-body leading-[1.6]">Here are seven deadly sins of speaking.</p><p class="text-[12px] text-muted mt-0.5">以下是七种说话的"死罪"。</p></button>
              </div>
            </div>

            <!-- ============ 折叠态：窄字幕轨 + 顶部展开按钮 ============ -->
            <div id="panelCollapsed" class="hidden">
              <!-- 顶部小条：标题 + 展开按钮，鼠标不用移远 -->
              <div class="flex items-center justify-between px-2 py-2 border-b border-hairline">
                <span class="text-[11px] font-semibold uppercase tracking-wider text-muted-soft px-1">字幕</span>
                <button id="expandBtn" class="w-8 h-8 rounded-lg flex items-center justify-center text-muted hover:bg-surface-card hover:text-ink transition-colors cursor-pointer" title="展开字幕面板"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
              </div>
              <!-- 只显示一列字幕条（窄轨） -->
              <div class="scroll-thin overflow-y-auto p-1.5" style="max-height:540px">
                <button class="w-full text-left px-2 py-2 rounded-lg bg-brand-50 border-l-2 border-brand-500 transition-colors cursor-pointer"><p class="text-[12px] font-semibold text-ink leading-snug">I think the most important thing is to be honest and authentic.</p><p class="text-[11px] text-muted mt-0.5 leading-snug">我认为最重要的是保持诚实与真实。</p></button>
                <button class="w-full text-left px-2 py-2 rounded-lg hover:bg-surface-soft transition-colors cursor-pointer"><p class="text-[12px] text-body leading-snug">The human voice is the most powerful sound in the world.</p><p class="text-[11px] text-muted mt-0.5 leading-snug">人类的声音是世界上最有力量的声音。</p></button>
                <button class="w-full text-left px-2 py-2 rounded-lg hover:bg-surface-soft transition-colors cursor-pointer"><p class="text-[12px] text-body leading-snug">It's the only one that can start a war or say "I love you."</p><p class="text-[11px] text-muted mt-0.5 leading-snug">它是唯一能发动战争、也能说出"我爱你"的声音。</p></button>
                <button class="w-full text-left px-2 py-2 rounded-lg hover:bg-surface-soft transition-colors cursor-pointer"><p class="text-[12px] text-body leading-snug">And yet many people have lost the habit of listening.</p><p class="text-[11px] text-muted mt-0.5 leading-snug">然而许多人已经失去了倾听的习惯。</p></button>
                <button class="w-full text-left px-2 py-2 rounded-lg hover:bg-surface-soft transition-colors cursor-pointer"><p class="text-[12px] text-body leading-snug">We speak too much, and we listen too little.</p><p class="text-[11px] text-muted mt-0.5 leading-snug">我们说得太多，听得太少。</p></button>
                <button class="w-full text-left px-2 py-2 rounded-lg hover:bg-surface-soft transition-colors cursor-pointer"><p class="text-[12px] text-body leading-snug">Here are seven deadly sins of speaking.</p><p class="text-[11px] text-muted mt-0.5 leading-snug">以下是七种说话的"死罪"。</p></button>
              </div>
            </div>

          </aside>
        </div>

      </div>
    </main>
  </div>
</div>

<script>
  const grid = document.getElementById('grid');
  const expanded = document.getElementById('panelExpanded');
  const collapsed = document.getElementById('panelCollapsed');
  const collapseBtn = document.getElementById('collapseBtn');
  const expandBtn = document.getElementById('expandBtn');

  function collapse(){
    expanded.classList.add('hidden');
    collapsed.classList.remove('hidden');
    grid.classList.add('collapsed');  // 视频列变大，字幕轨收窄到 220px
  }
  function expand(){
    collapsed.classList.add('hidden');
    expanded.classList.remove('hidden');
    grid.classList.remove('collapsed'); // 回到 2fr/1fr
  }
  collapseBtn.addEventListener('click', collapse);
  expandBtn.addEventListener('click', expand);

  document.getElementById('speakToggle').addEventListener('click', () => {
    document.getElementById('speakPanel').classList.toggle('hidden');
  });
</script>
</body>
</html>
