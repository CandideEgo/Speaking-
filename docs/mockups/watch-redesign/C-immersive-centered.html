<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>布局 C — 沉浸式居中</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      fontFamily: { sans: ['Inter','-apple-system','BlinkMacSystemFont','"Segoe UI"','sans-serif'] },
      colors: {
        brand: { 50:'#fff1eb',100:'#ffe0d3',200:'#ffc1a8',300:'#ff9b76',400:'#ff7a45',500:'#ff5a1f',600:'#e84a10',700:'#c33c0c' },
        canvas:'#ffffff','surface-soft':'#fafafa','surface-card':'#f4f4f5',
        ink:'#0a0a0a', body:'#27272a', muted:'#71717a','muted-soft':'#a1a1aa',
        hairline:'#ededed','surface-dark':'#0a0a0a',
      },
      borderRadius: { sm:'8px', DEFAULT:'12px', lg:'16px', pill:'9999px' },
      boxShadow: { soft:'0 1px 2px rgba(10,10,10,.04)', card:'0 2px 8px rgba(10,10,10,.05)', lift:'0 12px 32px rgba(10,10,10,.08)', brand:'0 8px 24px rgba(255,90,31,.28)' },
    }}
  }
</script>
<style>
  body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0a0a0a;color:#fafafa;}
  .scroll-thin::-webkit-scrollbar{width:8px} .scroll-thin::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:4px}
  .word:hover{background:rgba(255,90,31,.25);color:#fff;border-radius:4px}
  .word-hl{background:rgba(255,90,31,.3);color:#fff;border-radius:4px}
  .drawer{transition:transform .35s cubic-bezier(.4,0,.2,1);}
</style>
</head>
<body class="min-h-screen">

<!-- 顶栏（深色沉浸） -->
<header class="max-w-[1100px] mx-auto px-6 pt-5 pb-3 flex items-center gap-4">
  <a href="index.html" class="inline-flex items-center gap-1.5 text-sm font-medium text-white/60 hover:text-white transition-colors shrink-0">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    返回
  </a>
  <h1 class="text-[14px] font-medium text-white/80 truncate flex-1 text-center">How to Speak So That People Want to Listen</h1>
  <div class="flex items-center gap-1 shrink-0">
    <button class="w-9 h-9 rounded-lg flex items-center justify-center text-white/60 hover:bg-white/10 hover:text-white transition-colors" title="收藏">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </button>
    <button class="w-9 h-9 rounded-lg flex items-center justify-center text-white/60 hover:bg-white/10 hover:text-white transition-colors" title="分享">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
    </button>
  </div>
</header>

<main class="max-w-[1100px] mx-auto px-6 pb-24">
  <!-- 视频居中大尺寸，字幕叠加底部 -->
  <div class="relative w-full rounded-xl overflow-hidden bg-black aspect-video shadow-lift">
    <img src="https://picsum.photos/seed/speaking-watch-c/1280/720" class="absolute inset-0 w-full h-full object-cover opacity-80" alt=""/>
    <div class="absolute inset-0 bg-gradient-to-t from-black/85 via-black/10 to-black/30"></div>
    <button class="absolute inset-0 flex items-center justify-center group">
      <span class="w-20 h-20 rounded-full bg-white/90 flex items-center justify-center shadow-xl group-hover:scale-105 transition-transform">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="#ff5a1f" class="ml-1"><path d="M8 5v14l11-7z"/></svg>
      </span>
    </button>

    <!-- 字幕叠加在视频底部 -->
    <div class="absolute left-0 right-0 bottom-0 px-6 pb-6 text-center">
      <p class="text-[20px] font-semibold leading-snug text-white drop-shadow-lg">
        <span class="word-hl">I think</span><span class="word"> the most important thing </span><span class="word">is to be honest</span><span class="word"> and authentic.</span>
      </p>
      <p class="text-[14px] text-white/75 mt-1 drop-shadow">我认为最重要的是保持诚实与真实。</p>
    </div>

    <!-- 进度条 -->
    <div class="absolute left-0 right-0 bottom-0 px-4 pb-1.5">
      <div class="h-1 rounded-full bg-white/25 overflow-hidden"><div class="h-full bg-brand-500" style="width:38%"></div></div>
    </div>
  </div>

  <!-- 浮动紧凑控制条：跟读 + 分数 + 字幕/练习入口 -->
  <div class="mt-4 flex items-center justify-center gap-3">
    <button id="speakToggle" class="inline-flex items-center gap-1.5 px-4 py-2.5 rounded-lg text-[13px] font-semibold text-white bg-brand-500 hover:bg-brand-600 shadow-brand transition-colors">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>
      跟读这一句
    </button>

    <!-- 分数胶囊（已练过才显示，这里静态展示） -->
    <div class="inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-white/5 border border-white/10 text-[13px] text-white/70">
      <span class="w-6 h-6 rounded-full bg-success/20 text-success flex items-center justify-center text-[11px] font-bold">87</span>
      上次得分
    </div>

    <!-- 字幕列表抽屉触发 -->
    <button id="openDrawer" class="inline-flex items-center gap-1.5 px-4 py-2.5 rounded-lg text-[13px] font-semibold text-white/80 bg-white/5 border border-white/10 hover:bg-white/10 transition-colors">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
      字幕
    </button>
  </div>

  <!-- 跟读展开态（默认隐藏） -->
  <div id="speakPanel" class="hidden mt-4 max-w-[560px] mx-auto">
    <div class="flex items-center gap-3 bg-white/5 border border-white/10 rounded-lg p-3">
      <button class="w-11 h-11 rounded-full bg-brand-500 text-white flex items-center justify-center shadow-brand animate-pulse shrink-0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="4" height="12" rx="1"/><rect x="14" y="6" width="4" height="12" rx="1"/></svg>
      </button>
      <div class="flex-1">
        <p class="text-[13px] font-semibold text-white">正在录音…</p>
        <div class="flex items-end gap-0.5 h-5 mt-1">
          <span class="w-1 bg-brand-400 rounded" style="height:40%"></span><span class="w-1 bg-brand-400 rounded" style="height:75%"></span><span class="w-1 bg-brand-400 rounded" style="height:55%"></span><span class="w-1 bg-brand-400 rounded" style="height:90%"></span><span class="w-1 bg-brand-400 rounded" style="height:30%"></span>
        </div>
      </div>
      <span class="text-[13px] text-white/60">00:03</span>
      <button class="text-[13px] font-semibold text-white/60 hover:text-white px-2">取消</button>
    </div>
  </div>
</main>

<!-- 字幕抽屉（右侧滑入，默认关闭） -->
<div id="drawerMask" class="hidden fixed inset-0 bg-black/50 z-40"></div>
<aside id="drawer" class="drawer fixed top-0 right-0 h-full w-[380px] max-w-[90vw] bg-[#161616] border-l border-white/10 z-50 translate-x-full">
  <div class="flex items-center justify-between px-4 py-3.5 border-b border-white/10">
    <span class="text-sm font-bold text-white">字幕</span>
    <button id="closeDrawer" class="w-8 h-8 rounded-lg flex items-center justify-center text-white/60 hover:bg-white/10 hover:text-white transition-colors">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="flex items-center gap-1 px-3 pt-3">
    <button class="flex-1 px-3 py-1.5 rounded-lg text-[13px] font-semibold bg-brand-500/20 text-brand-400">双语</button>
    <button class="flex-1 px-3 py-1.5 rounded-lg text-[13px] font-medium text-white/60 hover:bg-white/5 transition-colors">英文</button>
    <button class="flex-1 px-3 py-1.5 rounded-lg text-[13px] font-medium text-white/60 hover:bg-white/5 transition-colors">中文</button>
  </div>
  <div class="scroll-thin overflow-y-auto p-2" style="max-height:calc(100vh - 120px)">
    <button class="w-full text-left px-3 py-2.5 rounded-lg bg-brand-500/15 border-l-2 border-brand-500">
      <p class="text-[14px] font-semibold text-white">I think the most important thing is to be honest and authentic.</p>
      <p class="text-[12px] text-white/55 mt-0.5">我认为最重要的是保持诚实与真实。</p>
    </button>
    <button class="w-full text-left px-3 py-2.5 rounded-lg hover:bg-white/5 transition-colors">
      <p class="text-[14px] text-white/85">The human voice is the most powerful sound in the world.</p>
      <p class="text-[12px] text-white/55 mt-0.5">人类的声音是世界上最有力量的声音。</p>
    </button>
    <button class="w-full text-left px-3 py-2.5 rounded-lg hover:bg-white/5 transition-colors">
      <p class="text-[14px] text-white/85">It's the only one that can start a war or say "I love you."</p>
      <p class="text-[12px] text-white/55 mt-0.5">它是唯一能发动战争、也能说出"我爱你"的声音。</p>
    </button>
    <button class="w-full text-left px-3 py-2.5 rounded-lg hover:bg-white/5 transition-colors">
      <p class="text-[14px] text-white/85">And yet many people have lost the habit of listening.</p>
      <p class="text-[12px] text-white/55 mt-0.5">然而许多人已经失去了倾听的习惯。</p>
    </button>
    <button class="w-full text-left px-3 py-2.5 rounded-lg hover:bg-white/5 transition-colors">
      <p class="text-[14px] text-white/85">We speak too much, and we listen too little.</p>
      <p class="text-[12px] text-white/55 mt-0.5">我们说得太多，听得太少。</p>
    </button>
    <button class="w-full text-left px-3 py-2.5 rounded-lg hover:bg-white/5 transition-colors">
      <p class="text-[14px] text-white/85">Here are seven deadly sins of speaking.</p>
      <p class="text-[12px] text-white/55 mt-0.5">以下是七种说话的"死罪"。</p>
    </button>
  </div>
</aside>

<script>
  document.getElementById('speakToggle').addEventListener('click', () => {
    document.getElementById('speakPanel').classList.toggle('hidden');
  });
  const drawer = document.getElementById('drawer');
  const mask = document.getElementById('drawerMask');
  const open = () => { mask.classList.remove('hidden'); drawer.classList.remove('translate-x-full'); };
  const close = () => { mask.classList.add('hidden'); drawer.classList.add('translate-x-full'); };
  document.getElementById('openDrawer').addEventListener('click', open);
  document.getElementById('closeDrawer').addEventListener('click', close);
  mask.addEventListener('click', close);
</script>
</body>
</html>
