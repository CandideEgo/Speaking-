            - generic [ref=e92]:
              - link "一、关于 Sapiens AI" [ref=e93] [cursor=pointer]:
                - /url: "#3764a189eee580b29de6e7a95aba6b70"
                - img [ref=e94]
              - text: 一、关于 Sapiens AI
          - generic [ref=e96]: Sapiens AI 是 Agnes AI 的母公司，专注于研发先进的多模态 AI 模型与基础设施，致力于为下一代智能应用、创意应用和交互式产品提供强大的 AI 能力支持。
          - generic [ref=e97]: 我们的使命是：
          - generic [ref=e98]: 让世界级 AI 属于每一个人。
          - generic [ref=e99]: 通过 Agnes AI，我们希望降低高质量 AI 技术的使用门槛，让开发者、创作者、创业团队和企业都能够以更简单、更稳定、更低成本的方式，将先进的 AI 能力接入自己的产品与业务中。
          - generic [ref=e100]: 我们相信，世界级 AI 不应该只属于少数大型机构，而应该成为每一位开发者都能使用、每一个产品都能集成、每一个用户都能受益的基础能力。
          - generic [ref=e101]: Agnes AI，让世界级 AI 属于每一个人。
          - separator [ref=e102]
          - heading "二、Agnes AI API 简介" [level=3] [ref=e103]:
            - generic [ref=e104]:
              - link "二、Agnes AI API 简介" [ref=e105] [cursor=pointer]:
                - /url: "#3764a189eee5801abfecca98890232e4"
                - img [ref=e106]
              - text: 二、Agnes AI API 简介
          - generic [ref=e108]: Agnes AI API 为开发者提供统一、稳定、易接入的多模态 AI 模型服务，支持文本、图像、视频等多种生成与理解能力。
          - generic [ref=e109]: 开发者可以通过 Agnes AI API 快速构建 AI 原生应用，包括但不限于：
          - list [ref=e110]:
            - listitem [ref=e111]: AI 对话与文本生成
          - list [ref=e112]:
            - listitem [ref=e113]: 逻辑推理与内容理解
          - list [ref=e114]:
            - listitem [ref=e115]: 文生图与图像编辑
          - list [ref=e116]:
            - listitem [ref=e117]: 图生视频与视频生成
          - list [ref=e118]:
            - listitem [ref=e119]: 音视频同步生成
          - list [ref=e120]:
            - listitem [ref=e121]: Agent 工具与自动化工作流
          - list [ref=e122]:
            - listitem [ref=e123]: 创意内容生成与多模态交互应用
          - generic [ref=e124]: Agnes AI API 兼容 OpenAI 风格接口，方便开发者基于现有代码快速迁移和接入，减少开发成本，提高集成效率。
          - separator [ref=e125]
          - heading "三、核心能力" [level=3] [ref=e126]:
