                - img [ref=e447]
              - text: 快速开始
          - generic [ref=e449]: 按照以下步骤，即可快速高效地开始使用 Agnes AI API。
          - heading "前置条件" [level=3] [ref=e450]:
            - generic [ref=e451]:
              - link "前置条件" [ref=e452] [cursor=pointer]:
                - /url: "#6ad0e36b67d74f72b95c4b82ccd0d013"
                - img [ref=e453]
              - text: 前置条件
          - generic [ref=e455]: 在发起任何 API 请求之前，请确保您已具备以下条件：
          - list [ref=e456]:
            - listitem [ref=e457]: 已激活的 Agnes AI Platform 账户
          - list [ref=e458]:
            - listitem [ref=e459]: 有效的 API Key（可在 Agnes AI 开发者控制台中生成）
          - list [ref=e460]:
            - listitem [ref=e461]: 账户余额，注册赠送0.1美元初始金额（不充值可享受免费账户权益，调用免费模型不扣费，有rpm限制）
          - heading "第一步：创建账户" [level=3] [ref=e462]:
            - generic [ref=e463]:
              - link "第一步：创建账户" [ref=e464] [cursor=pointer]:
                - /url: "#8436b2d013e44bc4afd3aba5b60b89cc"
                - img [ref=e465]
              - text: 第一步：创建账户
          - generic [ref=e467]: 注册一个新的账户，或登录您现有的 Agnes AI Platform 账户。
          - generic [ref=e468]: 在开发者控制台中，您可以管理 API Key、账单信息以及其他相关配置。
          - heading "第二步：生成 API Key" [level=3] [ref=e469]:
            - generic [ref=e470]:
              - link "第二步：生成 API Key" [ref=e471] [cursor=pointer]:
                - /url: "#99d9e2ca942c4d4ca20c6638d0b8aa16"
                - img [ref=e472]
              - text: 第二步：生成 API Key
          - generic [ref=e474]: 为了验证您的 API 请求身份，请在 Agnes AI Platform 中创建一个 Secret API Key：
          - generic [ref=e475]: 进入：
          - code [ref=e477]: Settings → API Keys → Create new secret key
          - generic [ref=e478]: 请妥善保存该密钥。后续所有 API 请求都将使用此密钥进行身份验证（详见 Authentication 章节）。
          - generic [ref=e479]:
            - img [ref=e482] [cursor=pointer]
            - code [ref=e485]: "Authorization: Bearer YOUR_API_KEY"
          - heading "第三步：充值账户余额" [level=3] [ref=e486]:
            - generic [ref=e487]:
              - link "第三步：充值账户余额" [ref=e488] [cursor=pointer]:
