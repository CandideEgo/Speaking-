                - img [ref=e489]
              - text: 第三步：充值账户余额
          - generic [ref=e492]: 进入：
          - code [ref=e494]: Billing → Balance
          - generic [ref=e495]: 按照页面提示为账户充值。
          - generic [ref=e496]: 注意：免费用户可以直接跳过充值。
          - heading "第四步：发送第一个请求" [level=3] [ref=e497]:
            - generic [ref=e498]:
              - link "第四步：发送第一个请求" [ref=e499] [cursor=pointer]:
                - /url: "#a18507e8679a4039adb5afc63a9c215d"
                - img [ref=e500]
              - text: 第四步：发送第一个请求
          - generic [ref=e502]:
            - text: 下面是一个使用
            - code [ref=e503]: curl
            - text: 创建 Chat Completion 的示例请求（您也可以使用 Postman、Python requests 或其他 HTTP 客户端工具）：
          - generic [ref=e504]:
            - img [ref=e507] [cursor=pointer]
            - code [ref=e510]: "curl https://apihub.agnes-ai.com/v1/chat/completions \\ -H \"Authorization: Bearer YOUR_API_KEY\" \\ -H \"Content-Type: application/json\" \\ -d '{ \"model\": \"agnes-2.0-flash\", \"messages\": [ { \"role\": \"user\", \"content\": \"Hello!\" } ] }'"
          - generic [ref=e511]:
            - text: 💡 在运行请求之前，请将
            - code [ref=e512]: YOUR_API_KEY
            - text: 替换为您的实际 API Key。
          - generic [ref=e513]: 请求成功后，系统将返回与输入内容相对应的聊天补全结果。
